<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人备忘录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{
background:#050610;
color:#e8e8e8;
min-height:100vh;
padding-bottom:60px;
}
#bg{
position:fixed;top:0;left:0;
width:100%;height:100%;
z-index:-1;
background: radial-gradient(ellipse at top, rgba(110,140,255,0.15), transparent 60%),
            radial-gradient(ellipse at bottom, rgba(255,120,220,0.12), transparent 60%);
}
.nav{
position:fixed;top:0;left:0;right:0;
background:rgba(5,6,16,0.7);
backdrop-filter:blur(12px);
padding:16px 20px;
text-align:center;font-size:18px;font-weight:600;
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:10;
}
.container{
max-width:700px;margin:80px auto 0;padding:0 16px;
}
.write-box{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.1);
border-radius:16px;padding:20px;
margin-bottom:20px;
}
textarea{
width:100%;height:140px;
background:transparent;border:none;
color:#fff;font-size:15px;line-height:1.6;
outline:none;resize:none;
}
button{
padding:10px 22px;background:linear-gradient(90deg,#7ac,#f7a);
border:none;border-radius:12px;color:#fff;font-weight:600;cursor:pointer;
}
.list{
display:flex;flex-direction:column;gap:12px;
}
.item{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:14px;padding:16px;
position:relative;
}
.date{
font-size:12px;color:#999;margin-bottom:6px;
}
.content{
font-size:15px;color:#eee;line-height:1.6;
white-space:pre-wrap;
}
.del{
position:absolute;right:12px;top:12px;
background:#ff4d4f;border:none;padding:4px 10px;
font-size:12px;border-radius:8px;cursor:pointer;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="nav">个人备忘录</div>

<div class="container">
  <div class="write-box">
    <textarea id="text" placeholder="写下你想说的话..."></textarea>
    <button onclick="save()">发布</button>
  </div>
  <div class="list" id="list"></div>
</div>

<script>
const c = document.getElementById('bg');
const ctx = c.getContext('2d');

let stars = [];
let meteors = [];

function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
  initStars();
}

function initStars(){
  stars = [];
  for(let i=0;i<180;i++){
    stars.push({
      x: Math.random()*c.width,
      y: Math.random()*c.height,
      r: Math.random()*1.2+0.2,
      o: Math.random(),
      s: Math.random()*0.05
    })
  }
}

function createMeteor(){
  if(Math.random()<0.03){
    meteors.push({
      x: Math.random()*c.width,
      y: 0,
      l: Math.random()*80+40,
      s: Math.random()*6+4
    })
  }
}

function draw(){
  ctx.fillStyle = 'rgba(5,6,16,0.3)';
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle = '#fff';
  stars.forEach(s=>{
    s.o += s.s;
    let op = Math.sin(s.o)*0.5+0.5;
    ctx.globalAlpha = op;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  })
  ctx.globalAlpha = 1;

  ctx.strokeStyle = 'rgba(180,200,255,0.6)';
  ctx.lineWidth = 2;
  meteors.forEach((m,i)=>{
    ctx.beginPath();
    ctx.moveTo(m.x,m.y);
    ctx.lineTo(m.x-m.l,m.y+m.l);
    ctx.stroke();
    m.x += m.s;
    m.y += m.s;
    if(m.y>c.height) meteors.splice(i,1);
  })

  createMeteor();
  requestAnimationFrame(draw);
}

resize();
draw();
window.addEventListener('resize',resize);

function formatTime(){
  const d = new Date();
  const Y = d.getFullYear();
  const M = String(d.getMonth()+1).padStart(2,'0');
  const D = String(d.getDate()).padStart(2,'0');
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return `${Y}-${M}-${D} ${h}:${m}`;
}

function load(){
  const data = JSON.parse(localStorage.getItem('blog')||'[]');
  const list = document.getElementById('list');
  list.innerHTML = data.reverse().map((i,idx)=>`
    <div class="item">
      <button class="del" onclick="del(${idx})">删除</button>
      <div class="date">${i.time}</div>
      <div class="content">${i.text}</div>
    </div>
  `).join('');
}

function save(){
  const text = document.getElementById('text').value.trim();
  if(!text) return;
  const data = JSON.parse(localStorage.getItem('blog')||'[]');
  data.push({text,time:formatTime()});
  localStorage.setItem('blog',JSON.stringify(data));
  document.getElementById('text').value='';
  load();
}

function del(idx){
  let data = JSON.parse(localStorage.getItem('blog')||'[]');
  data.reverse().splice(idx,1);
  localStorage.setItem('blog',JSON.stringify(data));
  load();
}

load();
</script>
</body>
</html>
